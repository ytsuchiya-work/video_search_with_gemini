bundle:
  name: video_search_with_gemini

workspace:
  host: https://fevm-classic-stable-ytcy.cloud.databricks.com/
  profile: fevm-classic-stable-ytcy

variables:
  catalog:
    default: classic_stable_ytcy_catalog
  schema:
    default: mulitmodal_video_search_with_gemini

resources:
  apps:
    video_search_with_gemini:
      name: video-search-with-gemini
      description: "FMAPI Gemini + Vector Search による動画シーン意味検索アプリ"
      source_code_path: ./app

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
